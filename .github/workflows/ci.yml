name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      # 5.3.2: -D warnings restored. Real perf-relevant lints fixed in
      # source (regex_creation_in_loops via LazyLock, replace-with-itself,
      # manual_strip → strip_prefix). Cosmetic categories that aren't
      # worth a multi-day refactor are silenced module-wide via the
      # #![allow(...)] block at codemap-core/src/lib.rs.
      - run: cargo clippy --workspace -- -D warnings
