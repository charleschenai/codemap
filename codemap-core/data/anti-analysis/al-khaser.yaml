# al-khaser anti-analysis signature corpus
#
# Source: al-khaser (LordNoteworthy et al., GPL-2.0)
#   https://github.com/LordNoteworthy/al-khaser
#
# This file contains only *factual* signatures — driver names, registry
# keys, MAC OUI prefixes, CPUID hypervisor strings, process names, and
# similar — observed in the al-khaser source. The signatures themselves
# are properties of the underlying VMM / sandbox / debugger software
# (Oracle's actual driver names, IEEE's actual MAC OUIs, vendor-defined
# CPUID strings) and are not creatively copyrightable. No GPL'd al-khaser
# source code is included in codemap; this file is permissively licensed
# (MIT) along with the rest of codemap.
#
# Schema (each entry):
#   - id:        kebab-case unique identifier
#     family:    one of the AntiAnalysisFamily enum values
#                (anti-debug, anti-vm-vbox, anti-vm-vmware, anti-vm-qemu,
#                anti-vm-bochs, anti-vm-kvm, anti-vm-xen, anti-vm-parallels,
#                anti-vm-wine, anti-sandbox-cuckoo, anti-sandbox-sandboxie,
#                anti-sandbox-joebox, anti-sandbox-generic, anti-av,
#                anti-disasm, anti-dump, timing, code-injection,
#                rtt-human-interaction, hypervisor-driver)
#     vendor:    free-text vendor label
#     subkind:   match style — process_name, module_name, driver_sys,
#                registry_key, device_path, pci_ven_id, mac_oui,
#                cpuid_hv_vendor, wmi_query, sandbox_username,
#                sandbox_hostname, decoy_filename, window_class,
#                service_name, import_api
#     signature: the literal to match (substring match against PE
#                strings; for import_api the form is "dll!fn")
#     severity:  high | medium | low
#     ref:       upstream source pointer

