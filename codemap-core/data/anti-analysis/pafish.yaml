# pafish anti-analysis signature corpus
#
# Source: pafish v06 (Alberto Ortega / a0rtega, GPL-3.0)
#   https://github.com/a0rtega/pafish
#
# Signatures here are factual — Oracle's actual driver names, IEEE's
# actual MAC OUIs, vendor-defined CPUID strings — not creative
# expression. No GPL'd pafish source code is included in codemap; this
# file is permissively licensed (MIT) along with the rest of codemap.
#
# Pafish overlaps with al-khaser on most VBox/VMware regkeys + drivers;
# entries here are the *complementary* picks (additional file paths,
# device handles, generic-sandbox heuristics, and Bochs/QEMU CPU brand
# strings) that pafish carries but al-khaser does not.
#
# Schema: see al-khaser.yaml header.

